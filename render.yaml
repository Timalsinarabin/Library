services:
  - type: web
    name: library-app
    env: ruby
    plan: free
    buildCommand: "bundle install && bundle lock --add-platform x86_64-linux && rails db:prepare"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: library-db
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false

databases:
  - name: library-db
    plan: free